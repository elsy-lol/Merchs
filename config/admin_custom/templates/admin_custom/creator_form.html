{% extends 'admin_custom/base.html' %}

{% block title %}{{ creator|yesno:"Редактировать,Добавить" }} исполнителя{% endblock %}

{% block content %}
<div class="admin-header">
    <h1 class="admin-title">🎤 {{ creator|yesno:"Редактировать,Добавить" }} исполнителя</h1>
    <a href="{% url 'custom-admin-creators' %}" class="btn btn-secondary">← Назад</a>
</div>

<form method="post" class="admin-form">
    {% csrf_token %}
    
    <div class="form-group">
        <label class="form-label">Имя *</label>
        <input type="text" name="name" class="form-input" value="{{ creator.name|default:'' }}" required>
    </div>
    
    <div class="form-group">
        <label class="form-label">Slug *</label>
        <input type="text" name="slug" class="form-input" value="{{ creator.slug|default:'' }}" required>
        <small style="color: var(--text-muted);">Например: gonefluddd, lsp</small>
    </div>
    
    <div class="form-group">
        <label class="form-label">Описание</label>
        <textarea name="description" class="form-textarea">{{ creator.description|default:'' }}</textarea>
    </div>
    
    <div style="display: flex; gap: 1rem;">
        <button type="submit" class="btn btn-primary">💾 Сохранить</button>
        <a href="{% url 'custom-admin-creators' %}" class="btn btn-secondary">Отмена</a>
    </div>
</form>
{% endblock %}
