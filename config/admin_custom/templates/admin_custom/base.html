<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Админка{% endblock %} | MerchMarket</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #1a1a2e;
            --bg-elevated: #16213e;
            --bg-tertiary: #0f3460;
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --text-muted: #666666;
            --accent-primary: #ff006e;
            --accent-purple: #8338ec;
            --accent-success: #00c853;
            --accent-warning: #ffab00;
            --accent-danger: #ff3d00;
            --border-color: #333333;
            --radius-md: 8px;
            --radius-lg: 12px;
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
            --transition-fast: 0.2s ease;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
        }
        
        .admin-layout {
            display: grid;
            grid-template-columns: 280px 1fr;
            min-height: 100vh;
        }
        
        /* Sidebar */
        .admin-sidebar {
            background: var(--bg-secondary);
            border-right: 2px solid var(--border-color);
            padding: 2rem 1rem;
            position: sticky;
            top: 0;
            height: 100vh;
            overflow-y: auto;
        }
        
        .admin-logo {
            font-size: 1.5rem;
            font-weight: 800;
            color: var(--accent-primary);
            text-align: center;
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        
        .admin-nav {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }
        
        .admin-nav-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.875rem 1rem;
            color: var(--text-secondary);
            text-decoration: none;
            border-radius: var(--radius-md);
            transition: all var(--transition-fast);
            font-weight: 500;
        }
        
        .admin-nav-link:hover {
            background: var(--bg-tertiary);
            color: var(--text-primary);
        }
        
        .admin-nav-link.active {
            background: var(--accent-primary);
            color: var(--text-inverse);
        }
        
        .admin-nav-link .icon {
            font-size: 1.25rem;
        }
        
        /* Main Content */
        .admin-main {
            padding: 2rem;
            background: var(--bg-primary);
        }
        
        .admin-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            padding-bottom: 1rem;
            border-bottom: 2px solid var(--border-color);
        }
        
        .admin-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--text-primary);
            text-transform: uppercase;
        }
        
        .admin-user {
            display: flex;
            align-items: center;
            gap: 1rem;
        }
        
        .admin-user-name {
            color: var(--text-secondary);
        }
        
        .btn {
            padding: 0.75rem 1.5rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            cursor: pointer;
            transition: all var(--transition-fast);
            border: none;
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        
        .btn-primary {
            background: var(--accent-primary);
            color: white;
        }
        
        .btn-primary:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }
        
        .btn-secondary {
            background: transparent;
            color: var(--text-primary);
            border: 2px solid var(--border-color);
        }
        
        .btn-secondary:hover {
            border-color: var(--accent-primary);
            color: var(--accent-primary);
        }
        
        .btn-danger {
            background: var(--accent-danger);
            color: white;
        }
        
        .btn-success {
            background: var(--accent-success);
            color: white;
        }
        
        /* Cards */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: var(--bg-elevated);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 1.5rem;
        }
        
        .stat-card-icon {
            font-size: 2.5rem;
            margin-bottom: 1rem;
        }
        
        .stat-card-value {
            font-size: 2rem;
            font-weight: 800;
            color: var(--accent-primary);
        }
        
        .stat-card-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
            text-transform: uppercase;
        }
        
        /* Tables */
        .admin-table {
            width: 100%;
            background: var(--bg-elevated);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }
        
        .admin-table th,
        .admin-table td {
            padding: 1rem 1.5rem;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        
        .admin-table th {
            background: var(--bg-tertiary);
            font-weight: 700;
            text-transform: uppercase;
            font-size: 0.85rem;
            color: var(--text-secondary);
        }
        
        .admin-table tr:hover {
            background: var(--bg-tertiary);
        }
        
        .admin-table tr:last-child td {
            border-bottom: none;
        }
        
        /* Badges */
        .badge {
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius-full);
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
        }
        
        .badge-success {
            background: rgba(0, 200, 83, 0.1);
            color: var(--accent-success);
        }
        
        .badge-warning {
            background: rgba(255, 171, 0, 0.1);
            color: var(--accent-warning);
        }
        
        .badge-danger {
            background: rgba(255, 61, 0, 0.1);
            color: var(--accent-danger);
        }
        
        .badge-info {
            background: rgba(0, 150, 255, 0.1);
            color: #0096ff;
        }
        
        /* Forms */
        .admin-form {
            background: var(--bg-elevated);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-lg);
            padding: 2rem;
            max-width: 800px;
        }
        
        .form-group {
            margin-bottom: 1.5rem;
        }
        
        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
        }
        
        .form-input,
        .form-select,
        .form-textarea {
            width: 100%;
            padding: 0.875rem 1rem;
            background: var(--bg-primary);
            border: 2px solid var(--border-color);
            border-radius: var(--radius-md);
            font-size: 1rem;
            color: var(--text-primary);
            font-family: inherit;
        }
        
        .form-input:focus,
        .form-select:focus,
        .form-textarea:focus {
            outline: none;
            border-color: var(--accent-primary);
        }
        
        .form-textarea {
            min-height: 120px;
            resize: vertical;
        }
        
        /* Messages */
        .messages {
            margin-bottom: 2rem;
        }
        
        .message {
            padding: 1rem 1.5rem;
            border-radius: var(--radius-md);
            margin-bottom: 0.5rem;
        }
        
        .message-success {
            background: rgba(0, 200, 83, 0.1);
            border: 2px solid var(--accent-success);
            color: var(--accent-success);
        }
        
        .message-error {
            background: rgba(255, 61, 0, 0.1);
            border: 2px solid var(--accent-danger);
            color: var(--accent-danger);
        }
        
        /* Actions */
        .actions-cell {
            display: flex;
            gap: 0.5rem;
        }
        
        .actions-cell .btn {
            padding: 0.5rem 0.75rem;
            font-size: 0.8rem;
        }
        
        /* Responsive */
        @media (max-width: 1024px) {
            .admin-layout {
                grid-template-columns: 1fr;
            }
            
            .admin-sidebar {
                position: static;
                height: auto;
                border-right: none;
                border-bottom: 2px solid var(--border-color);
            }
        }
    </style>
</head>
<body>
    <div class="admin-layout">
        <!-- Sidebar -->
        <aside class="admin-sidebar">
            <div class="admin-logo">🎨 ADMIN</div>
            <nav class="admin-nav">
                <a href="{% url 'custom-admin-dashboard' %}" class="admin-nav-link {% if request.resolver_match.url_name == 'custom-admin-dashboard' %}active{% endif %}">
                    <span class="icon">📊</span>
                    <span>Дашборд</span>
                </a>
                <a href="{% url 'custom-admin-creators' %}" class="admin-nav-link {% if 'creator' in request.resolver_match.url_name %}active{% endif %}">
                    <span class="icon">🎤</span>
                    <span>Исполнители</span>
                </a>
                <a href="{% url 'custom-admin-categories' %}" class="admin-nav-link {% if 'category' in request.resolver_match.url_name %}active{% endif %}">
                    <span class="icon">📁</span>
                    <span>Категории</span>
                </a>
                <a href="{% url 'custom-admin-products' %}" class="admin-nav-link {% if 'product' in request.resolver_match.url_name %}active{% endif %}">
                    <span class="icon">👕</span>
                    <span>Товары</span>
                </a>
                <a href="{% url 'custom-admin-orders' %}" class="admin-nav-link {% if 'order' in request.resolver_match.url_name %}active{% endif %}">
                    <span class="icon">📦</span>
                    <span>Заказы</span>
                </a>
                <a href="{% url 'custom-admin-payments' %}" class="admin-nav-link {% if 'payment' in request.resolver_match.url_name %}active{% endif %}">
                    <span class="icon">💳</span>
                    <span>Платежи</span>
                </a>
                <a href="{% url 'custom-admin-users' %}" class="admin-nav-link {% if 'user' in request.resolver_match.url_name %}active{% endif %}">
                    <span class="icon">👥</span>
                    <span>Пользователи</span>
                </a>
                <hr style="border-color: var(--border-color); margin: 1rem 0;">
                <a href="/admin/" class="admin-nav-link">
                    <span class="icon">⚙️</span>
                    <span>Стандартная админка</span>
                </a>
                <a href="/" class="admin-nav-link">
                    <span class="icon">🏠</span>
                    <span>На сайт</span>
                </a>
                <a href="{% url 'custom-admin-logout' %}" class="admin-nav-link">
                    <span class="icon">🚪</span>
                    <span>Выйти</span>
                </a>
            </nav>
        </aside>
        
        <!-- Main Content -->
        <main class="admin-main">
            {% if messages %}
            <div class="messages">
                {% for message in messages %}
                <div class="message {% if message.tags == 'success' %}message-success{% else %}message-error{% endif %}">
                    {{ message }}
                </div>
                {% endfor %}
            </div>
            {% endif %}
            
            {% block content %}{% endblock %}
        </main>
    </div>
</body>
</html>
